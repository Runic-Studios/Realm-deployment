apiVersion: agones.dev/v1
kind: GameServer
metadata:
  name: {{ .Values.gameserver.name }}-{{ .Values.prTag }}
  namespace: {{ .Values.namespace }}
spec:
  health:
    initialDelaySeconds: 120
  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
      container: realm-paper
      portPolicy: Dynamic
    - name: grpc
      containerPort: 50051
      protocol: TCP
      container: realm-paper
      portPolicy: None  # Prevents Agones from dynamically allocating a port for gRPC on the node
  template:
    spec:
      containers:
        - name: realm-paper
          image: "{{ .Values.gameserver.image }}:pr-{{ .Values.prTag }}"
          resources:
            requests:
              memory: {{ .Values.gameserver.resources.requests.memory }}
              cpu: {{ .Values.gameserver.resources.requests.cpu }}
            limits:
              memory: {{ .Values.gameserver.resources.limits.memory }}
              cpu: {{ .Values.gameserver.resources.limits.cpu }}
          volumeMounts:  # These will be injected into /opt/paper using Palimpsest by the entrypoint
            - name: paper-base-config
              mountPath: /overlays/base
              readOnly: true
            - name: paper-env-config
              mountPath: /overlays/env
              readOnly: true
            - name: velocity-forwarding
              mountPath: /opt/paper/forwarding.secret
              subPath: forwarding.secret
              readOnly: true
            - name: mongodb
              mountPath: /opt/paper/mongodb.secret
              subPath: mongodb.secret
              readOnly: true
            - name: world
              mountPath: /mnt/world
              readOnly: true
            - name: realm-paper-base
              mountPath: /mnt/realm-paper-base
              readOnly: true
          env:
            - name: VELAGONES_GRPC_PORT
              value: "50051"
            - name: DEBUGGER_ENABLED
              value: "{{ .Values.gameserver.debugger }}"
            - name: JVM_MEMORY
              value: "{{ .Values.gameserver.jvm.memory }}"
      volumes:
        - name: paper-base-config
          configMap:
            name: paper-base-config
        - name: paper-env-config
          configMap:
            name: paper-env-config
        - name: velocity-forwarding
          secret:
            secretName: velocity-forwarding-secret
            items:
              - key: forwarding.secret
                path: forwarding.secret
        - name: mongodb
          secret:
            secretName: mongodb-secret
            items:
              - key: mongodb.secret
                path: mongodb.secret
        - name: world
          persistentVolumeClaim:
            claimName: world-pvc
            readOnly: true
        - name: realm-paper-base
          persistentVolumeClaim:
            claimName: realm-paper-base-pvc
            readOnly: true
